<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/me-ascii-art.png" type="image/gif">
    <title>Blog Post - Ankit Raj</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        /* Blog-specific styles - markdown content */
        body {
            padding-top: 80px;
        }

        /* Blog Header Styles */
        .blog-header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
            list-style: none;
            gap: 30px;
        }

        .blog-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .blog-profile-image {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(88, 166, 255, 0.3);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .blog-profile-image:hover {
            transform: scale(1.05);
        }

        .blog-title-link {
            font-size: 1.5em;
            font-weight: 600;
            text-decoration: none;
        }

        .blog-header-center {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .blog-header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .blog-social-link {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .blog-social-link:hover {
            background: rgba(88, 166, 255, 0.2);
            transform: translateY(-2px);
            color: #79c0ff;
        }

        @media (max-width: 768px) {
            .blog-header-nav {
                flex-direction: column;
                gap: 15px;
                padding: 0 20px;
            }

            .blog-header-center {
                flex-direction: column;
                gap: 15px;
            }
        }

        /* Blog Post Container - Medium Style */
        .blog-post-container {
            max-width: 1050px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .blog-post-wrapper {
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 12px;
            padding: 60px 80px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .blog-post-header {
            margin-bottom: 50px;
        }

        .blog-post-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 20px;
            color: #c9d1d9;
        }

        .blog-post-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            font-size: 1rem;
            color: #8b949e;
        }

        .blog-post-publisher {
            font-weight: 600;
            color: #58a6ff;
        }

        .blog-post-date {
            color: #8b949e;
        }

        .blog-post-divider {
            height: 1px;
            background: rgba(88, 166, 255, 0.2);
            margin: 40px 0;
        }

        /* Markdown Content Styles - Medium-like */
        .blog-post-content {
            font-size: 1.25rem;
            line-height: 1.8;
            color: #c9d1d9;
        }

        .blog-post-content h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-top: 50px;
            margin-bottom: 20px;
            line-height: 1.2;
            color: #c9d1d9;
        }

        .blog-post-content h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 15px;
            line-height: 1.3;
            color: #c9d1d9;
        }

        .blog-post-content h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 12px;
            line-height: 1.4;
            color: #c9d1d9;
        }

        .blog-post-content h4,
        .blog-post-content h5,
        .blog-post-content h6 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-top: 25px;
            margin-bottom: 10px;
            color: #c9d1d9;
        }

        .blog-post-content p {
            margin-bottom: 20px;
            color: #c9d1d9;
        }

        .blog-post-content a {
            color: #58a6ff;
            text-decoration: none;
            border-bottom: 1px solid rgba(88, 166, 255, 0.3);
            transition: all 0.3s ease;
        }

        .blog-post-content a:hover {
            color: #79c0ff;
            border-bottom-color: rgba(121, 192, 255, 0.6);
        }

        .blog-post-content code {
            background: rgba(88, 166, 255, 0.1);
            color: #79c0ff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: 'Courier New', monospace;
        }

        .blog-post-content pre {
            background: #161b22;
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            margin: 30px 0;
            line-height: 1.6;
        }

        .blog-post-content pre code {
            background: none;
            color: #c9d1d9;
            padding: 0;
            font-size: 0.9em;
            font-family: 'Courier New', 'Consolas', 'Monaco', monospace;
        }

        /* Prism.js syntax highlighting overrides */
        .blog-post-content pre[class*="language-"] {
            background: #161b22;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .blog-post-content code[class*="language-"] {
            background: transparent;
        }

        .blog-post-content blockquote {
            border-left: 4px solid #58a6ff;
            padding-left: 20px;
            margin: 30px 0;
            color: #8b949e;
            font-style: italic;
        }

        .blog-post-content ul,
        .blog-post-content ol {
            margin: 20px 0;
            padding-left: 30px;
        }

        .blog-post-content li {
            margin-bottom: 10px;
            color: #c9d1d9;
        }

        .blog-post-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 30px 0;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .blog-post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
        }

        .blog-post-content table th,
        .blog-post-content table td {
            padding: 12px;
            border: 1px solid rgba(88, 166, 255, 0.2);
            text-align: left;
        }

        .blog-post-content table th {
            background: rgba(88, 166, 255, 0.1);
            font-weight: 600;
            color: #58a6ff;
        }

        .blog-post-content hr {
            border: none;
            border-top: 1px solid rgba(88, 166, 255, 0.2);
            margin: 40px 0;
        }

        /* KaTeX math formula styling */
        .blog-post-content .katex {
            font-size: 1.1em;
            color: #c9d1d9;
        }

        .blog-post-content .katex-display {
            margin: 30px 0;
            overflow-x: auto;
            overflow-y: visible !important;
        }

        .blog-post-content .katex-display > .katex {
            display: inline-block;
            text-align: initial;
        }

        /* Loading and Error States */
        .loading,
        .error {
            text-align: center;
            padding: 100px 20px;
            color: #8b949e;
            font-size: 1.2em;
        }

        .error {
            color: #f85149;
        }

        @media (max-width: 768px) {
            .blog-post-container {
                padding: 40px 20px;
            }

            .blog-post-wrapper {
                padding: 40px 30px;
            }

            .blog-post-title {
                font-size: 2.5rem;
            }

            .blog-post-content {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

    <script>
        // Format date for display
        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        // Get blog_id from URL
        function getBlogId() {
            // Check hash first (for sharing URLs like blog.html#blog-id)
            if (window.location.hash) {
                const hashId = window.location.hash.substring(1); // Remove #
                if (hashId) {
                    return hashId;
                }
            }
            
            // Check URL params (for links like blog.html?blog_id=blog-id)
            const urlParams = new URLSearchParams(window.location.search);
            const paramId = urlParams.get('blog_id');
            if (paramId) {
                return paramId;
            }
            
            return null;
        }

        // Load and render blog post
        async function loadBlogPost() {
            const blogId = getBlogId();
            
            if (!blogId) {
                showError('No blog ID provided. Please specify a blog ID in the URL.');
                return;
            }

            try {
                // Load blog metadata from contents.json
                const contentsResponse = await fetch('blogs/contents.json');
                if (!contentsResponse.ok) {
                    throw new Error('Failed to load blog contents');
                }
                const blogs = await contentsResponse.json();
                const blogMeta = blogs.find(b => b.blog_id === blogId);

                if (!blogMeta) {
                    throw new Error('Blog not found in contents.json');
                }

                // Load markdown file
                const markdownResponse = await fetch(`blogs/${blogId}.md`);
                if (!markdownResponse.ok) {
                    throw new Error('Failed to load blog markdown file');
                }
                const markdown = await markdownResponse.text();

                // Render the blog post
                document.getElementById('loading').style.display = 'none';
                
                // Set metadata
                document.getElementById('blog-title').textContent = blogMeta.title;
                document.getElementById('blog-publisher').textContent = blogMeta.publisher;
                document.getElementById('blog-date').textContent = formatDate(blogMeta.date_published);
                
                // Configure marked to use Prism for syntax highlighting
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (lang && typeof Prism !== 'undefined' && Prism.languages[lang]) {
                            try {
                                return Prism.highlight(code, Prism.languages[lang], lang);
                            } catch (e) {
                                return code;
                            }
                        }
                        return code;
                    },
                    langPrefix: 'language-'
                });

                // Configure marked to use Prism for syntax highlighting
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (lang && typeof Prism !== 'undefined' && Prism.languages[lang]) {
                            try {
                                return Prism.highlight(code, Prism.languages[lang], lang);
                            } catch (e) {
                                return code;
                            }
                        }
                        return code;
                    },
                    langPrefix: 'language-'
                });

                // Render markdown
                const html = marked.parse(markdown);
                document.getElementById('blog-body').innerHTML = html;
                
                // Trigger Prism to highlight code blocks after a short delay to ensure Prism is loaded
                setTimeout(() => {
                    if (typeof Prism !== 'undefined') {
                        Prism.highlightAll();
                    }
                    
                    // Render math formulas with KaTeX
                    if (typeof renderMathInElement !== 'undefined') {
                        renderMathInElement(document.getElementById('blog-body'), {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                                {left: '\\[', right: '\\]', display: true},
                                {left: '\\(', right: '\\)', display: false}
                            ],
                            throwOnError: false
                        });
                    }
                }, 100);
                
                // Update page title
                document.title = `${blogMeta.title} - Ankit Raj's Blog`;
                
                // Show content
                document.getElementById('blog-content').style.display = 'block';
                
            } catch (error) {
                console.error('Error loading blog post:', error);
                showError(`Failed to load blog post: ${error.message}`);
            }
        }

        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').textContent = message;
            document.getElementById('error').style.display = 'block';
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadBlogPost();
        });

        // Also handle hash changes
        window.addEventListener('hashchange', () => {
            loadBlogPost();
        });
    </script>
